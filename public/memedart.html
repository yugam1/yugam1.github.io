<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>🎯 MemeDart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(-20deg);
                opacity: 0
            }

            50% {
                transform: scale(1.2) rotate(3deg)
            }

            100% {
                transform: scale(1) rotate(0);
                opacity: 1
            }
        }

        @keyframes slideUp {
            0% {
                transform: translateY(30px);
                opacity: 0
            }

            100% {
                transform: translateY(0);
                opacity: 1
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0)
            }

            15% {
                transform: translateX(-10px) rotate(-1deg)
            }

            30% {
                transform: translateX(10px) rotate(1deg)
            }

            45% {
                transform: translateX(-6px)
            }

            60% {
                transform: translateX(6px)
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.08)
            }
        }

        @keyframes bgPan {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        @keyframes particle {
            0% {
                transform: translateY(0) scale(1);
                opacity: .9
            }

            100% {
                transform: translateY(-140px) scale(0);
                opacity: 0
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0
            }

            100% {
                opacity: 1
            }
        }

        @keyframes spinIn {
            0% {
                transform: rotate(-360deg) scale(0);
                opacity: 0
            }

            60% {
                transform: rotate(15deg) scale(1.15)
            }

            100% {
                transform: rotate(0) scale(1);
                opacity: 1
            }
        }

        @keyframes glitch {

            0%,
            100% {
                transform: translate(0)
            }

            25% {
                transform: translate(-3px, 2px)
            }

            50% {
                transform: translate(3px, -2px)
            }

            75% {
                transform: translate(-2px, -1px)
            }
        }

        .btn {
            border: none;
            cursor: pointer;
            font-family: monospace;
            font-weight: 700;
            transition: transform .15s
        }

        .btn:hover {
            transform: scale(1.05)
        }
    </style>
</head>

        function generatePlayerNumbers(numPlayers) {
            const sectionSize = Math.floor(20 / (numPlayers + 1));
            const result = [];
            for (let i = 0; i < numPlayers; i++) {
                const startIdx = i * sectionSize;
                const endIdx = startIdx + sectionSize;
                const nums = [];
                for (let j = startIdx; j < endIdx; j++) nums.push(SEGS[j]);
                result.push(nums);
            }
            return result;
        }
        function rng(a) { return a[Math.floor(Math.random() * a.length)] }
        function p2s(d, a) {
            if (d <= R_.dB) return { seg: 25, mul: 2, sc: 50, lbl: "D-BULL" };
            if (d <= R_.sB) return { seg: 25, mul: 1, sc: 25, lbl: "S-BULL" };
            if (d > R_.b) return { seg: 0, mul: 0, sc: 0, lbl: "MISS" };
            let a2 = ((a + SA / 2) % 360 + 360) % 360, i = Math.floor(a2 / SA) % 20, s = SEGS[i];
            if (d <= R_.iS) return { seg: s, mul: 1, sc: s, lbl: "S" + s };
            if (d <= R_.t) return { seg: s, mul: 3, sc: s * 3, lbl: "T" + s };
            if (d <= R_.oS) return { seg: s, mul: 1, sc: s, lbl: "S" + s };
            if (d <= R_.d) return { seg: s, mul: 2, sc: s * 2, lbl: "D" + s };
            return { seg: 0, mul: 0, sc: 0, lbl: "MISS" };
        }
        function memeCat(sc, mul, seg) {
            if (seg === 25 && mul === 2) return "legendary"; if (seg === 25) return "hype";
            if (mul === 3 && sc >= 45) return "beast"; if (mul === 3) return "hype";
            if (sc === 0) return "roast"; if (sc <= 5) return "roast"; if (sc >= 40) return "beast";
            if (sc <= 15) return "meh"; return "hype";
        }

        // return a non-repeating meme from a category, resetting when all have been shown
        function pickMeme(cat) {
            const arr = MEMES[cat] || [];
            if (!S.usedMemes[cat] || S.usedMemes[cat].length >= arr.length) {
                S.usedMemes[cat] = [];
            }
            if (arr.length === 0) return null;
            let idx;
            do {
                idx = Math.floor(Math.random() * arr.length);
            } while (S.usedMemes[cat].includes(idx) && S.usedMemes[cat].length < arr.length);
            S.usedMemes[cat].push(idx);
            // include category so we can recover if the gif fails
            return { ...arr[idx], cat };
        }

        function snap() { return JSON.parse(JSON.stringify({ scores: S.scores, targets: S.targets, cp: S.cp, darts: S.darts, turnSc: S.turnSc, kHits: S.kHits, kIsK: S.kIsK, kLives: S.kLives })) }
        function restore(s) { Object.assign(S, s); S.winner = null; S.meme = null; }

        // ═══════════════════════════════════════
        //  SVG BOARD BUILDER
        // ═══════════════════════════════════════
        function boardSVG(sz, hl) {
            const R = sz / 2;
            let svg = `<svg width="${sz}" height="${sz}" viewBox="${-R - 20} ${-R - 20} ${sz + 40} ${sz + 40}" style="cursor:crosshair;user-select:none;display:block">`;
            svg += `<circle cx="0" cy="0" r="${R * R_.b}" fill="#1a1a1a" stroke="#333" stroke-width="2"/>`;
            for (let i = 0; i < 20; i++) {
                const s1 = (i * SA - SA / 2 - 90) * Math.PI / 180, s2 = ((i + 1) * SA - SA / 2 - 90) * Math.PI / 180, ev = i % 2 === 0;
                const sn = SEGS[i], hc = hl[sn];
                [[R_.sB, R_.iS, hc || (ev ? "#1a1a1a" : "#F2E8D5")], [R_.iS, R_.t, ev ? "#E8333A" : "#2D8C4E"],
                [R_.t, R_.oS, hc || (ev ? "#1a1a1a" : "#F2E8D5")], [R_.oS, R_.d, ev ? "#E8333A" : "#2D8C4E"]
                ].forEach(([ri, ro, cl], j) => {
                    const ir = ri * R, or = ro * R, c1 = Math.cos(s1), n1 = Math.sin(s1), c2 = Math.cos(s2), n2 = Math.sin(s2);
                    const op = hc && (j === 0 || j === 2) ? "0.65" : "1";
                    svg += `<path d="M${c1 * ir} ${n1 * ir}A${ir} ${ir} 0 0 1 ${c2 * ir} ${n2 * ir}L${c2 * or} ${n2 * or}A${or} ${or} 0 0 0 ${c1 * or} ${n1 * or}Z" fill="${cl}" stroke="#333" stroke-width=".5" opacity="${op}"/>`;
                });
                const la = (i * SA - 90) * Math.PI / 180, lr = R_.b * R + 14;
                svg += `<text x="${Math.cos(la) * lr}" y="${Math.sin(la) * lr}" fill="${hc || '#888'}" font-size="11" font-weight="${hc ? '900' : '700'}" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;pointer-events:none">${sn}</text>`;
            }
            svg += `<circle cx="0" cy="0" r="${R * R_.sB}" fill="#2D8C4E" stroke="#333" stroke-width=".5"/>`;
            svg += `<circle cx="0" cy="0" r="${R * R_.dB}" fill="#E8333A" stroke="#333" stroke-width=".5"/>`;
            S.darts.forEach(d => {
                svg += `<circle cx="${d.x * R}" cy="${d.y * R}" r="5" fill="#FFD700" stroke="#000" stroke-width="1.5"/>`;
                svg += `<circle cx="${d.x * R}" cy="${d.y * R}" r="2" fill="#000"/>`;
            });
            svg += `</svg>`;
            return svg;
        }

        function rulesHTML() {

        // ═══════════════════════════════════════
        //  GAME LOGIC
        // ═══════════════════════════════════════
        function startGame() {
            const pls = S.players.map((p, i) => ({ n: p.n.trim(), c: p.c, id: 'p' + i }));
            S.players = pls; S.cp = 0; S.darts = []; S.turnSc = 0; S.meme = null; S.winner = null; S.hist = [];
            S.usedMemes = {}; // clear meme history when a new game starts
            if (S.gid === "standard501") { S.scores = pls.map(() => 501); S.targets = []; }
            else if (S.gid === "aroundTheClock") { S.scores = pls.map(() => 0); S.targets = pls.map(() => 1); }
            else if (S.gid === "killer") {
                const nums = generatePlayerNumbers(pls.length);
                S.kNums = nums; S.kHits = pls.map(() => 0); S.kIsK = pls.map(() => false); S.kLives = pls.map(() => 3); S.scores = [];
            }
            S.phase = "play"; render();
        }

        function boardClick(e) {
            if (S.meme || S.darts.length >= 3 || S.winner) return;
            const svg = e.currentTarget, rc = svg.getBoundingClientRect();
            const sz = rc.width, R = sz / 2;
            const x = e.clientX - rc.left - R, y = e.clientY - rc.top - R;
            const d = Math.sqrt(x * x + y * y) / R, a = ((Math.atan2(y, x) * 180 / Math.PI) + 90 + 360) % 360;
            const hit = { ...p2s(d, a), x: x / R, y: y / R };
            S.hist.push(snap());

            if (S.gid === "aroundTheClock") {
                const t = S.targets[S.cp], isH = hit.seg === t, adv = isH ? hit.mul : 0, nt = Math.min(21, t + adv), won = nt > 20;
                S.targets[S.cp] = nt; S.scores[S.cp] = nt - 1; S.darts.push(hit);
                const cat = won ? "legendary" : isH ? (hit.mul >= 2 ? "beast" : "hype") : (hit.sc === 0 ? "roast" : "meh");
                S.meme = { ...pickMeme(cat), sub: won ? `🏆 ${S.players[S.cp].n} WINS!` : undefined, isWin: won };
                if (won) S.winner = S.players[S.cp].n;
                render(); autoDissmiss(); return;
            }

            if (S.gid === "killer") {
                S.darts.push(hit); const my = S.kNums[S.cp];
                if (!S.kIsK[S.cp]) {
                    if (my.includes(hit.seg)) { S.kHits[S.cp] += hit.mul; if (S.kHits[S.cp] >= 3) { S.kIsK[S.cp] = true; S.meme = { ...pickMeme("killer_become"), sub: S.players[S.cp].n + ' is KILLER!' }; } else S.meme = { ...pickMeme("hype"), sub: S.kHits[S.cp] + '/3 to Killer' }; }
                    else S.meme = pickMeme(hit.sc === 0 ? "roast" : "meh");
                } else {
                    if (my.includes(hit.seg)) { S.kLives[S.cp] = Math.max(0, S.kLives[S.cp] - 1); checkKillerWin(); S.meme = { ...pickMeme("bust"), sub: 'Self-hit! ' + S.kLives[S.cp] + ' lives' }; }
                    else { let vi = -1; for (let j = 0; j < S.kNums.length; j++) { if (S.kNums[j].includes(hit.seg) && j !== S.cp && S.kLives[j] > 0) { vi = j; break; } } if (vi >= 0) { S.kLives[vi] = Math.max(0, S.kLives[vi] - 1); checkKillerWin(); S.meme = S.kLives[vi] <= 0 ? { ...pickMeme("killer_kill"), sub: S.players[vi].n + ' ELIMINATED!' } : { ...pickMeme("beast"), sub: S.players[vi].n + ': ' + S.kLives[vi] + ' lives' }; } else S.meme = pickMeme(hit.sc === 0 ? "roast" : "meh"); }
                }
                render(); autoDissmiss(); return;
            }

            // 501
            const ns = S.scores[S.cp] - hit.sc;
            if (ns < 0 || ns === 1) { S.darts.push(hit); S.meme = { ...rng(MEMES.bust), isBust: true }; render(); autoDissmiss(); return; }
            S.scores[S.cp] = ns; S.darts.push(hit); S.turnSc += hit.sc;
            if (ns === 0) { S.winner = S.players[S.cp].n; S.meme = { ...rng(MEMES.legendary), sub: '🏆 ' + S.players[S.cp].n + ' WINS!', isWin: true }; }
            else S.meme = rng(MEMES[memeCat(hit.sc, hit.mul, hit.seg)]);
            render(); autoDissmiss();
        }

        function checkKillerWin() {
            const alive = S.kLives.reduce((a, v, i) => v > 0 ? [...a, i] : a, []);
            if (alive.length <= 1 && alive.length > 0) { S.winner = S.players[alive[0]].n; S.meme = { ...rng(MEMES.legendary), sub: '🏆 ' + S.winner + ' WINS!', isWin: true }; }
        }

        function autoDissmiss() { clearTimeout(window._mt); window._mt = setTimeout(dismissMeme, 4500); }

        function dismissMeme() {
            clearTimeout(window._mt);
            const wasBust = S.meme?.isBust, wasWin = S.meme?.isWin;
            S.meme = null;
            if (wasWin) { S.phase = "over"; render(); return; }
            if (wasBust && S.hist.length) { const s = S.hist[S.hist.length - 1]; S.scores = s.scores; }
            if (wasBust || S.darts.length >= 3) { S.darts = []; S.turnSc = 0; S.hist = []; nextPlayer(); }
            render();
        }

        function nextPlayer() {
            if (S.gid === "killer") { let n = (S.cp + 1) % S.players.length; for (let i = 0; i < S.players.length; i++) { if (S.kLives[n] > 0) break; n = (n + 1) % S.players.length; } S.cp = n; }
            else S.cp = (S.cp + 1) % S.players.length;
        }

        function undo() { if (!S.hist.length || S.meme) return; const s = S.hist.pop(); restore(s); render(); }
        function endTurn() { S.darts = []; S.turnSc = 0; S.hist = []; nextPlayer(); render(); }
        function toggleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => { }); else document.exitFullscreen().catch(() => { }); }

        // ═══════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════
        render();
    </script>
